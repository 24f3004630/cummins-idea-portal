{% extends "base.html" %}

{% block content %}
<div class="row mb-4">
    <div class="col-md-12">
        <h3>Edit Publication</h3>
        <hr>
    </div>
</div>

<div class="row">
    <div class="col-md-8">
        <form method="POST" enctype="multipart/form-data" class="needs-validation">
            <div class="mb-3">
                <label for="title" class="form-label">Publication Title *</label>
                <input type="text" class="form-control" id="title" name="title" required value="{{ pub.title }}">
            </div>

            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="publication_type" class="form-label">Publication Type *</label>
                        <select class="form-select" id="publication_type" name="publication_type" required>
                            <option value="">-- Select Type --</option>
                            <option value="Journal" {% if pub.publication_type == 'Journal' %}selected{% endif %}>Journal</option>
                            <option value="Conference" {% if pub.publication_type == 'Conference' %}selected{% endif %}>Conference</option>
                            <option value="Book" {% if pub.publication_type == 'Book' %}selected{% endif %}>Book</option>
                            <option value="Workshop" {% if pub.publication_type == 'Workshop' %}selected{% endif %}>Workshop</option>
                        </select>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="status" class="form-label">Status *</label>
                        <input type="text" class="form-control bg-light" value="{{ pub.status }}" readonly>
                        <input type="hidden" name="status" value="{{ pub.status }}">
                    </div>
                </div>
            </div>

            <div class="mb-3">
                <label for="venue" class="form-label">Venue/Journal Name</label>
                <input type="text" class="form-control" id="venue" name="venue" value="{{ pub.venue }}">
            </div>

            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="publication_date" class="form-label">Publication Month & Year</label>
                        <input type="month" class="form-control" id="publication_date" name="publication_date" value="{{ pub.publication_date.strftime('%Y-%m') if pub.publication_date else '' }}">
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="volume" class="form-label">Volume/Issue</label>
                        <input type="text" class="form-control" id="volume" name="volume" value="{{ pub.volume }}">
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="page_number" class="form-label">Page Number</label>
                        <input type="text" class="form-control" id="page_number" name="page_number" placeholder="e.g., 10-25" value="{{ pub.page_number }}">
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="mb-3">
                        <label class="form-label">Indexing</label>
                        {% set selected_indexing = pub.indexing.split(', ') if pub.indexing else [] %}
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="indexing_scopus" name="indexing" value="Scopus" {% if 'Scopus' in selected_indexing %}checked{% endif %}>
                            <label class="form-check-label" for="indexing_scopus">1. Scopus</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="indexing_sci" name="indexing" value="SCI" {% if 'SCI' in selected_indexing %}checked{% endif %}>
                            <label class="form-check-label" for="indexing_sci">2. SCI</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="indexing_other" name="indexing" value="Other" {% if 'Other' in selected_indexing %}checked{% endif %}>
                            <label class="form-check-label" for="indexing_other">3. Other</label>
                        </div>
                        <div class="form-text">Select all indexing categories that apply.</div>
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="doi" class="form-label">DOI</label>
                        <input type="text" class="form-control" id="doi" name="doi" value="{{ pub.doi }}">
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="issn_isbn" class="form-label">ISSN/ISBN</label>
                        <input type="text" class="form-control" id="issn_isbn" name="issn_isbn" value="{{ pub.issn_isbn }}">
                    </div>
                </div>
            </div>

            <div class="mb-3">
                <label for="publisher" class="form-label">Publisher</label>
                <input type="text" class="form-control" id="publisher" name="publisher" value="{{ pub.publisher }}">
            </div>

            <div class="mb-3">
                <label for="document" class="form-label">Replace Publication Document</label>
                <input type="file" class="form-control" id="document" name="document" accept=".pdf,.doc,.docx">
                {% if pub.document_url %}
                <div class="form-text">Current document: <a href="{{ pub.document_url }}" target="_blank">Download</a></div>
                {% endif %}
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">Save Changes</button>
                <a href="/faculty/project/{{ pub.project_id }}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
